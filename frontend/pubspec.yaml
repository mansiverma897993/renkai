name: renkai_app
description: "A new Flutter project for Renkai."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  google_fonts: ^6.1.0
  lottie: ^3.0.0
  dio: ^5.4.0
  go_router: ^13.2.0
  shared_preferences: ^2.2.2
  flutter_spinkit: ^5.2.1
  just_audio: ^0.9.36
  google_generative_ai: ^0.4.3
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
    - .env
