version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: renkai-pg
    environment:
      POSTGRES_USER: renkai
      POSTGRES_PASSWORD: renkai_password
      POSTGRES_DB: renkai_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
